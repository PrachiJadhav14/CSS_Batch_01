<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grouping Selectors</title>
    <style>
        div,h1,span,p,pre{
            background-color: chartreuse;
            color: white;
            border: 1px solid red;
        }
    </style>
</head>
<body>
    <!-- Grouping Selectors -->
     <div>Hiii , I Am Prachi Jadhav</div>
    <h1>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorem, nam.</h1>
    <span>Learning CSS</span>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Incidunt, consectetur.</p>
    <pre>Hello,
        Fork Infosystem
    </pre>
</body>
</html>
