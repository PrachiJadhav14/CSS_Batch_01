<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag_Selector</title>
    <style>
       div{
        color: blueviolet;
        background-color: aliceblue;
       }
       h1{
        color: rgb(224, 153, 22);
        background-color: aliceblue;
       }
       span{
        color: rgb(224, 153, 22);
        background-color: rgb(95, 213, 226);
       } 
       p{
        color: rgb(226, 13, 230);
        background-color: rgb(44, 237, 214);
       }
       pre{
          color: rgb(27, 16, 233);
        background-color: rgb(201, 22, 207);
       }
    </style>
</head>
<body>
    <!-- Tag Selector -->
    <div>Hiii , I Am Prachi Jadhav</div>
    <h1>Lorem ipsum dolor sit amet consectetur adipisicing elit. Dolorem, nam.</h1>
    <span>Learning CSS</span>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Incidunt, consectetur.</p>
    <pre>Hello,
        Fork Infosystem
    </pre>

</body>
</html>
